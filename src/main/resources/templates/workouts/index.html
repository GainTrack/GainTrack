<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Workouts</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">

</head>
<body class="bg-body-tertiary">
<div th:replace="~{fragments/navbar :: appNavbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
        <div>
            <h1 class="h2 mb-1">Workouts</h1>
            <p class="text-secondary mb-0">Manage and track your workouts</p>
        </div>

        <div class="d-flex gap-2 flex-wrap">
            <a th:href="@{/workouts/new}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Create workout</a>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(workouts)}" class="alert alert-info">
        No workouts available.
    </div>

    <div th:unless="${#lists.isEmpty(workouts)}" class="row g-4">
        <div class="col-md-6 col-xl-4" th:each="workout : ${workouts}">
            <div class="card h-100 shadow-sm app-card hover-lift">
                <div class="card-body d-flex flex-column">
                    <div class="d-flex align-items-center gap-2 mb-2">
                        <span class="icon-bubble bg-primary-subtle text-primary-emphasis">
                            <i class="bi bi-journal-check"></i>
                        </span>
                        <h2 class="h5 mb-0" th:text="${workout.name}">Workout name</h2>
                    </div>

                    <p class="text-secondary"
                       th:text="${workout.description != null and !#strings.isEmpty(workout.description) ? workout.description : 'No description available.'}">
                        Workout description
                    </p>

                    <div class="small text-secondary mb-2">
                        <strong>Exercises:</strong>
                        <span th:text="${workout.workoutExercises.size()}">0</span>
                    </div>

                    <div class="mb-3">
                        <div th:if="${workout.workoutExercises.isEmpty()}" class="text-secondary small">
                            No exercises added yet.
                        </div>

                        <div th:unless="${workout.workoutExercises.isEmpty()}" class="d-flex flex-wrap gap-2">
                            <span class="badge rounded-pill text-bg-light border app-chip"
                                  th:each="workoutExercise : ${workout.workoutExercises}"
                                  th:text="${workoutExercise.exercise.name}">
                                Exercise name
                            </span>
                        </div>
                    </div>

                    <div class="mt-auto">
                        <a th:href="@{/workouts/{id}(id=${workout.id})}" class="btn btn-outline-primary w-100">
                            View details
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
