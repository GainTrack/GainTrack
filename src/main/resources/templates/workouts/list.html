<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Workouts</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">

    <link rel="stylesheet" th:href="@{/css/workouts.css}">
</head>
<body>
<div class="container workouts-page">
    <div class="d-flex justify-content-between align-items-start mb-4">
        <div>
            <h1 class="workouts-title">Workouts</h1>
            <p class="workouts-subtitle">Manage and track your workouts</p>
        </div>

        <div class="d-flex gap-2 flex-wrap">
            <a th:href="@{/workouts/new}" class="btn create-workout-btn">Create workout</a>
            <a th:href="@{/}" class="btn back-home-btn">Back to home</a>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(workouts)}" class="info-box-soft">
        No workouts available.
    </div>

    <div th:unless="${#lists.isEmpty(workouts)}" class="row g-4">
        <div class="col-md-6 col-xl-4" th:each="workout : ${workouts}">
            <div class="card workout-card h-100">
                <div class="card-body d-flex flex-column">
                    <h2 class="workout-name" th:text="${workout.name}">Workout name</h2>

                    <p class="workout-description"
                       th:text="${workout.description != null and !#strings.isEmpty(workout.description) ? workout.description : 'No description available.'}">
                        Workout description
                    </p>

                    <div class="workout-meta">
                        <strong>Exercises:</strong>
                        <span th:text="${#lists.size(workout.workoutExercises)}">0</span>
                    </div>

                    <div class="mb-3">
                        <div th:if="${#lists.isEmpty(workout.workoutExercises)}" class="empty-chip-text">
                            No exercises added yet.
                        </div>

                        <div th:unless="${#lists.isEmpty(workout.workoutExercises)}">
                            <span class="exercise-chip"
                                  th:each="workoutExercise : ${workout.workoutExercises}"
                                  th:text="${workoutExercise.exercise.name}">
                                Exercise name
                            </span>
                        </div>
                    </div>

                    <div class="mt-auto d-grid gap-2">
                        <a th:href="@{/workouts/{id}(id=${workout.id})}" class="btn view-details-btn w-100">
                            View details
                        </a>
                        <button type="button"
                                class="btn btn-outline-danger w-100"
                                data-bs-toggle="modal"
                                th:attr="data-bs-target='#deleteWorkoutModal-' + ${workout.id}">
                            Delete workout
                        </button>
                    </div>
                </div>
            </div>

            <div class="modal fade"
                 th:id="'deleteWorkoutModal-' + ${workout.id}"
                 tabindex="-1"
                 th:attr="aria-labelledby='deleteWorkoutModalLabel-' + ${workout.id}"
                 aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2 class="modal-title fs-5"
                                th:id="'deleteWorkoutModalLabel-' + ${workout.id}">
                                Delete workout
                            </h2>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <p class="mb-0">
                                Are you sure you want to delete
                                <strong th:text="${workout.name}">Workout name</strong>?
                            </p>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                                Cancel
                            </button>
                            <form th:action="@{/workouts/{id}/delete(id=${workout.id})}" method="post">
                                <button type="submit" class="btn btn-danger">Delete workout</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
