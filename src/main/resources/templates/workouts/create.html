<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create workout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body class="bg-body-tertiary">
<div th:replace="~{fragments/navbar :: appNavbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
        <div>
            <h1 class="h2 mb-1">Create workout</h1>
            <p class="text-secondary mb-0">Build a workout by combining exercises and their working sets.</p>
        </div>
        <a th:href="@{/workouts}" class="btn btn-outline-secondary">Back to workouts</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">
        <form th:action="@{/workouts}" th:object="${workoutCreate}" method="post" class="row g-3">
            <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
            </div>

            <div class="col-12">
                <label for="name" class="form-label">Name</label>
                <input id="name"
                       type="text"
                       class="form-control"
                       th:field="*{name}"
                       placeholder="e.g. Push Day"
                       required>
                <div th:if="${#fields.hasErrors('name')}"
                     th:errors="*{name}"
                     class="text-danger small mt-1"></div>
            </div>

            <div class="col-12">
                <label for="description" class="form-label">Description</label>
                <textarea id="description"
                          class="form-control"
                          th:field="*{description}"
                          rows="4"
                          placeholder="Write a short description for the workout..."></textarea>
            </div>

            <div class="col-12 d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div>
                    <h2 class="h4 mb-1">Exercises</h2>
                    <p class="text-secondary mb-0">Add one or more exercises and define the sets for each one.</p>
                </div>
                <button type="button" class="btn btn-primary" onclick="addExerciseBlock()">Add exercise</button>
            </div>

            <div th:if="${#fields.hasErrors('exercises')}"
                 th:errors="*{exercises}"
                 class="text-danger small"></div>

            <div id="exerciseBlocks" class="col-12 d-flex flex-column gap-3">
                <div th:each="exerciseForm, stat : *{exercises}" class="exercise-card card border"
                     th:with="exerciseIndex=${stat.index}">
                    <div class="card-body d-flex flex-column gap-3">
                        <div>
                            <div class="h6 mb-1" th:text="'Exercise ' + ${exerciseIndex + 1}">Exercise 1</div>
                            <div class="text-secondary small">Pick the exercise and add its sets.</div>
                        </div>

                    <div>
                        <label class="form-label" th:for="'exercise-' + ${exerciseIndex} + '-exerciseId'">Exercise</label>
                        <select th:id="'exercise-' + ${exerciseIndex} + '-exerciseId'"
                                class="form-select"
                                th:field="*{exercises[__${exerciseIndex}__].exerciseId}"
                                required>
                            <option value="">Select an exercise</option>
                            <option th:each="exercise : ${availableExercises}"
                                    th:value="${exercise.id}"
                                    th:text="${exercise.name}"></option>
                        </select>
                        <div th:if="${#fields.hasErrors('exercises[' + exerciseIndex + '].exerciseId')}"
                             th:errors="*{exercises[__${exerciseIndex}__].exerciseId}"
                             class="text-danger small mt-1"></div>
                    </div>

                    <div class="d-flex flex-column gap-2">
                        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                            <h3 class="h6 mb-0">Sets</h3>
                            <button type="button"
                                    class="btn btn-outline-secondary btn-sm"
                                    th:attr="onclick='addSetRow(' + ${exerciseIndex} + ')'">
                                Add set
                            </button>
                        </div>

                        <div th:if="${#fields.hasErrors('exercises[' + exerciseIndex + '].sets')}"
                             th:errors="*{exercises[__${exerciseIndex}__].sets}"
                             class="text-danger small"></div>

                        <div class="set-rows d-flex flex-column gap-2" th:id="'exercise-' + ${exerciseIndex} + '-sets'">
                            <div th:each="setForm, setStat : *{exercises[__${exerciseIndex}__].sets}"
                                 class="set-row row g-2 align-items-start border rounded p-2 mx-0"
                                 th:with="setIndex=${setStat.index}">
                                <div class="col-12 col-md-2">
                                    <label class="form-label" th:for="'exercise-' + ${exerciseIndex} + '-set-' + ${setIndex} + '-number'">Set</label>
                                    <input type="number"
                                           class="form-control"
                                           th:id="'exercise-' + ${exerciseIndex} + '-set-' + ${setIndex} + '-number'"
                                           th:field="*{exercises[__${exerciseIndex}__].sets[__${setIndex}__].setNumber}"
                                           min="1"
                                           readonly>
                                </div>
                                <div class="col-12 col-md-5">
                                    <label class="form-label" th:for="'exercise-' + ${exerciseIndex} + '-set-' + ${setIndex} + '-reps'">Reps</label>
                                    <input type="number"
                                           class="form-control"
                                           th:id="'exercise-' + ${exerciseIndex} + '-set-' + ${setIndex} + '-reps'"
                                           th:field="*{exercises[__${exerciseIndex}__].sets[__${setIndex}__].numberOfReps}"
                                           min="1"
                                           placeholder="e.g. 10"
                                           required>
                                    <div th:if="${#fields.hasErrors('exercises[' + exerciseIndex + '].sets[' + setIndex + '].numberOfReps')}"
                                         th:errors="*{exercises[__${exerciseIndex}__].sets[__${setIndex}__].numberOfReps}"
                                         class="text-danger small mt-1"></div>
                                </div>
                                <div class="col-12 col-md-5">
                                    <label class="form-label" th:for="'exercise-' + ${exerciseIndex} + '-set-' + ${setIndex} + '-weight'">Weight (kg)</label>
                                    <input type="number"
                                           class="form-control"
                                           th:id="'exercise-' + ${exerciseIndex} + '-set-' + ${setIndex} + '-weight'"
                                           th:field="*{exercises[__${exerciseIndex}__].sets[__${setIndex}__].weight}"
                                           min="0"
                                           step="0.5"
                                           placeholder="e.g. 60"
                                           required>
                                    <div th:if="${#fields.hasErrors('exercises[' + exerciseIndex + '].sets[' + setIndex + '].weight')}"
                                         th:errors="*{exercises[__${exerciseIndex}__].sets[__${setIndex}__].weight}"
                                         class="text-danger small mt-1"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    </div>
                </div>
            </div>

            <div class="col-12 d-flex flex-wrap gap-2">
                <button type="submit" class="btn btn-primary">Create workout</button>
                <a th:href="@{/workouts}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
        </div>
    </div>
</div>

<template id="exercise-options-template">
    <option value="">Select an exercise</option>
    <option th:each="exercise : ${availableExercises}"
            th:value="${exercise.id}"
            th:text="${exercise.name}"></option>
</template>

<template id="set-template">
    <div class="set-row row g-2 align-items-start border rounded p-2 mx-0" data-set-index="__SET_INDEX__">
        <div class="col-12 col-md-2">
            <label class="form-label" for="exercise-__EXERCISE_INDEX__-set-__SET_INDEX__-number">Set</label>
            <input type="number"
                   class="form-control"
                   id="exercise-__EXERCISE_INDEX__-set-__SET_INDEX__-number"
                   name="exercises[__EXERCISE_INDEX__].sets[__SET_INDEX__].setNumber"
                   min="1"
                   value="__SET_NUMBER__"
                   readonly>
        </div>
        <div class="col-12 col-md-5">
            <label class="form-label" for="exercise-__EXERCISE_INDEX__-set-__SET_INDEX__-reps">Reps</label>
            <input type="number"
                   class="form-control"
                   id="exercise-__EXERCISE_INDEX__-set-__SET_INDEX__-reps"
                   name="exercises[__EXERCISE_INDEX__].sets[__SET_INDEX__].numberOfReps"
                   min="1"
                   placeholder="e.g. 10"
                   required>
        </div>
        <div class="col-12 col-md-5">
            <label class="form-label" for="exercise-__EXERCISE_INDEX__-set-__SET_INDEX__-weight">Weight (kg)</label>
            <input type="number"
                   class="form-control"
                   id="exercise-__EXERCISE_INDEX__-set-__SET_INDEX__-weight"
                   name="exercises[__EXERCISE_INDEX__].sets[__SET_INDEX__].weight"
                   min="0"
                   step="0.5"
                   placeholder="e.g. 60"
                   required>
        </div>
    </div>
</template>

<template id="exercise-template">
    <div class="exercise-card card border" data-exercise-index="__EXERCISE_INDEX__">
        <div class="card-body d-flex flex-column gap-3">
            <div>
                <div class="h6 mb-1">Exercise __EXERCISE_NUMBER__</div>
                <div class="text-secondary small">Pick the exercise and add its sets.</div>
            </div>

        <div>
            <label class="form-label" for="exercise-__EXERCISE_INDEX__-exerciseId">Exercise</label>
            <select id="exercise-__EXERCISE_INDEX__-exerciseId"
                    class="form-select"
                    name="exercises[__EXERCISE_INDEX__].exerciseId"
                    required>
                __EXERCISE_OPTIONS__
            </select>
        </div>

        <div class="d-flex flex-column gap-2">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <h3 class="h6 mb-0">Sets</h3>
                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="addSetRow(__EXERCISE_INDEX__)">Add set</button>
            </div>

            <div class="set-rows d-flex flex-column gap-2" id="exercise-__EXERCISE_INDEX__-sets">
                __SET_ROWS__
            </div>
        </div>
        </div>
    </div>
</template>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script th:src="@{/js/workout-form.js}"></script>
</body>
</html>
