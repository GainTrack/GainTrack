<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workout Details</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body class="bg-body-tertiary">
<div class="container py-4">
  <div class="mb-4">
    <div class="d-flex gap-2 flex-wrap mb-3">
      <a th:href="@{/workouts}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back to workouts</a>
      <a th:href="@{/workouts/new}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Create workout</a>
    </div>

    <div class="card shadow-sm app-card">
      <div class="card-body">
        <h1 class="card-title mb-3" th:text="${workout.name}">Workout Name</h1>
        <p class="card-text text-muted mb-0"
           th:text="${workout.description != null and !#strings.isEmpty(workout.description) ? workout.description : 'No description available.'}">
          Workout description
        </p>
      </div>
    </div>
  </div>

  <div th:if="${workout.workoutExercises.isEmpty()}" class="alert alert-info">
    This workout has no exercises yet.
  </div>

  <div th:unless="${workout.workoutExercises.isEmpty()}">
    <h2 class="mb-3">Exercises</h2>

    <div class="accordion" id="workoutExercisesAccordion">
      <div class="accordion-item" th:each="workoutExercise, stat : ${workout.workoutExercises}">
        <h2 class="accordion-header">
          <button class="accordion-button collapsed"
                  type="button"
                  data-bs-toggle="collapse"
                  th:attr="data-bs-target='#collapse-' + ${stat.index}, aria-controls='collapse-' + ${stat.index}">
                        <span>
                            <strong th:text="${workoutExercise.position}">1</strong>.
                            <span th:text="${workoutExercise.exercise.name}">Exercise name</span>
                        </span>
          </button>
        </h2>

        <div class="accordion-collapse collapse"
             th:id="'collapse-' + ${stat.index}"
             data-bs-parent="#workoutExercisesAccordion">
          <div class="accordion-body">
            <p class="mb-3 text-muted"
               th:text="${workoutExercise.exercise.description != null and !#strings.isEmpty(workoutExercise.exercise.description) ? workoutExercise.exercise.description : 'No exercise description available.'}">
              Exercise description
            </p>

            <div th:if="${workoutExercise.sets.isEmpty()}" class="alert alert-warning mb-0">
              No sets available for this exercise.
            </div>

            <div th:unless="${workoutExercise.sets.isEmpty()}">
              <div class="table-responsive">
                <table class="table table-striped align-middle mb-0">
                  <thead>
                  <tr>
                    <th scope="col">Set</th>
                    <th scope="col">Reps</th>
                    <th scope="col">Weight (kg)</th>
                  </tr>
                  </thead>
                  <tbody>
                  <tr th:each="exerciseSet, setStat : ${workoutExercise.sets}">
                    <td th:text="${exerciseSet.setNumber}">1</td>
                    <td th:text="${exerciseSet.numberOfReps}">10</td>
                    <td th:text="${exerciseSet.weight}">50</td>
                  </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
