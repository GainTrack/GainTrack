<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit workout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body class="bg-body-tertiary">
<div th:replace="~{fragments/navbar :: appNavbar}"></div>

<div class="container py-4 py-lg-5">
    <div class="d-flex justify-content-between align-items-md-center align-items-start flex-wrap gap-3 mb-4">
        <div>
            <h1 class="h2 mb-1">Edit workout</h1>
            <p class="text-secondary mb-0">Update the workout exercises and their working sets.</p>
        </div>
        <a th:href="@{/workouts/{id}(id=${workoutId})}" class="btn btn-outline-secondary">Back to workout</a>
    </div>

    <div class="card shadow-sm workout-create-card">
        <div class="card-body p-4">
        <form th:action="@{/workouts/{id}/edit(id=${workoutId})}" th:object="${workoutCreate}" method="post" class="row g-3 g-lg-4">
            <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
            </div>

            <div class="col-12">
                <label for="name" class="form-label">Name</label>
                <input id="name"
                       type="text"
                       class="form-control"
                       th:field="*{name}"
                       placeholder="e.g. Push Day"
                       required>
                <div th:if="${#fields.hasErrors('name')}"
                     th:errors="*{name}"
                     class="text-danger small mt-1"></div>
            </div>

            <div class="col-12">
                <label for="description" class="form-label">Description</label>
                <textarea id="description"
                          class="form-control"
                          th:field="*{description}"
                          rows="4"
                          placeholder="Write a short description for the workout..."></textarea>
            </div>

            <div class="col-12 d-flex justify-content-between align-items-md-center align-items-start flex-wrap gap-3 pb-1">
                <div>
                    <h2 class="h4 mb-1">Exercises</h2>
                    <p class="text-secondary mb-0">Add one or more exercises and define the sets for each one.</p>
                </div>
                <button type="button" class="btn btn-primary d-inline-flex align-items-center gap-2" data-action="add-exercise">
                    <i class="bi bi-plus-circle"></i>
                    <span>Add exercise</span>
                </button>
            </div>

            <div th:if="${#fields.hasErrors('exercises')}"
                 th:errors="*{exercises}"
                 class="text-danger small"></div>

            <div id="exerciseBlocks" class="col-12 d-flex flex-column gap-3">
                <th:block th:each="exerciseForm, stat : *{exercises}">
                    <th:block th:replace="~{workouts/fragments/create-workout-rows :: createWorkoutExerciseRow(exerciseIndex=${stat.index}, exerciseForm=${exerciseForm}, availableExercises=${availableExercises})}"></th:block>
                </th:block>
            </div>

            <div class="col-12 d-flex justify-content-end flex-wrap gap-2 pt-1">
                <a th:href="@{/workouts/{id}(id=${workoutId})}" class="btn btn-outline-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Save changes</button>
            </div>
        </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script th:src="@{/js/workout-form.js}"></script>
</body>
</html>
