<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin users</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body class="bg-body-tertiary">
<div th:replace="~{fragments/navbar :: appNavbar}"></div>

<div class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
        <div>
            <h1 class="h2 mb-1">Users</h1>
            <p class="text-secondary mb-0">Admin overview of registered GainTrack accounts</p>
        </div>
    </div>

    <div class="row g-3 mb-3">
        <div class="col-6 col-lg-3">
            <div class="card shadow-sm app-card h-100">
                <div class="card-body">
                    <div class="small fw-semibold text-secondary mb-1">Total users</div>
                    <div class="h3 mb-0" th:text="${summary.totalUsers()}">0</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="card shadow-sm app-card h-100">
                <div class="card-body">
                    <div class="small fw-semibold text-secondary mb-1">Admins</div>
                    <div class="h3 mb-0" th:text="${summary.adminUsers()}">0</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="card shadow-sm app-card h-100">
                <div class="card-body">
                    <div class="small fw-semibold text-secondary mb-1">Enabled</div>
                    <div class="h3 mb-0" th:text="${summary.enabledUsers()}">0</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="card shadow-sm app-card h-100">
                <div class="card-body">
                    <div class="small fw-semibold text-secondary mb-1">Disabled</div>
                    <div class="h3 mb-0" th:text="${summary.disabledUsers()}">0</div>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <form th:action="@{/admin/users}" method="get" class="row g-2 align-items-center">
                <div class="col-12 col-lg">
                    <input type="text"
                           name="search"
                           class="form-control"
                           placeholder="Search by username or email..."
                           th:value="${search}">
                </div>
                <div class="col-12 col-sm-6 col-lg-2">
                    <select name="role" class="form-select" aria-label="Filter by role">
                        <option value="" th:selected="${role == null || #strings.isEmpty(role)}">All roles</option>
                        <option value="ADMIN" th:selected="${role == 'ADMIN'}">Admins</option>
                        <option value="USER" th:selected="${role == 'USER'}">Users</option>
                    </select>
                </div>
                <div class="col-12 col-sm-6 col-lg-2">
                    <select name="status" class="form-select" aria-label="Filter by status">
                        <option value="" th:selected="${status == null || #strings.isEmpty(status)}">All statuses</option>
                        <option value="enabled" th:selected="${status == 'enabled'}">Enabled</option>
                        <option value="disabled" th:selected="${status == 'disabled'}">Disabled</option>
                    </select>
                </div>
                <div class="col-12 col-lg-auto d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-search me-1"></i>Search
                    </button>
                    <a th:if="${(search != null && !#strings.isEmpty(search)) || (role != null && !#strings.isEmpty(role)) || (status != null && !#strings.isEmpty(status))}"
                       th:href="@{/admin/users}"
                       class="btn btn-outline-secondary">Clear</a>
                </div>
            </form>
        </div>
    </div>

    <div class="mb-3 text-secondary">
        Matching users: <strong th:text="${#lists.size(users)}">0</strong>
    </div>

    <div class="alert alert-info" th:if="${#lists.isEmpty(users)}">
        No users found.
    </div>

    <div class="card shadow-sm" th:if="${!#lists.isEmpty(users)}">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead>
                <tr>
                    <th scope="col">User</th>
                    <th scope="col">Role</th>
                    <th scope="col">Status</th>
                    <th scope="col" class="text-end">Workouts</th>
                    <th scope="col">Created</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td>
                        <div class="fw-semibold" th:text="${user.username()}">admin</div>
                        <div class="small text-secondary" th:text="${user.email()}">admin@gaintrack.local</div>
                    </td>
                    <td>
                        <span class="badge"
                              th:text="${user.role()}"
                              th:classappend="${user.role().name() == 'ADMIN' ? ' text-bg-primary' : ' text-bg-secondary'}">
                            ADMIN
                        </span>
                    </td>
                    <td>
                        <span class="badge"
                              th:text="${user.enabled() ? 'Enabled' : 'Disabled'}"
                              th:classappend="${user.enabled() ? ' text-bg-success' : ' text-bg-danger'}">
                            Enabled
                        </span>
                    </td>
                    <td class="text-end" th:text="${user.workoutCount()}">0</td>
                    <td class="text-secondary" th:text="${#temporals.format(user.createdAt(), 'dd MMM yyyy HH:mm')}">
                        01 Jan 2026 10:00
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
