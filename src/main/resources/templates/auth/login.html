<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | GainTrack</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body class="bg-body-tertiary d-flex align-items-center min-vh-100">
<div class="container py-5 w-100">
    <div class="row justify-content-center w-100">
        <div class="col-12 col-sm-11 col-md-9 col-lg-7 col-xl-6">
            <div class="card border-0 shadow-sm app-card">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <img th:src="@{/pics/icon.png}" src="/pics/icon.png" alt="GainTrack" class="mb-3" width="56" height="56">
                        <h1 class="h2 fw-bold text-dark mb-1">Welcome back</h1>
                        <p class="text-secondary mb-0">Sign in to your account</p>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger py-2" role="alert">
                        Invalid username or password.
                    </div>

                    <div th:if="${param.logout}" class="alert alert-success py-2" role="alert">
                        You have been logged out.
                    </div>

                    <div th:if="${param.registered}" class="alert alert-success py-2" role="alert">
                        Account created successfully. You can now sign in.
                    </div>

                    <form th:action="@{/login}" method="post" class="d-grid gap-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div>
                            <label for="username" class="form-label fw-semibold">Username</label>
                            <input id="username" name="username" type="text" class="form-control form-control-lg" placeholder="your username" required autofocus>
                        </div>

                        <div>
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <input id="password" name="password" type="password" class="form-control form-control-lg" placeholder="********" required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg login-submit-btn">Log in</button>

                        <p class="text-secondary text-center mb-0">
                            If you don't have an account,
                            <a th:href="@{/register}" class="text-decoration-none fw-semibold">sign up here</a>.
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
