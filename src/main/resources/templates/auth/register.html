<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register | GainTrack</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body class="bg-body-tertiary d-flex align-items-center min-vh-100">
<div class="container py-5 w-100">
    <div class="row justify-content-center w-100">
        <div class="col-12 col-sm-11 col-md-9 col-lg-7 col-xl-6">
            <div class="card border-0 shadow-sm app-card">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <img th:src="@{/pics/icon.png}" src="/pics/icon.png" alt="GainTrack" class="mb-3" width="56" height="56">
                        <h1 class="h2 fw-bold text-dark mb-1">Create your account</h1>
                        <p class="text-secondary mb-0">Join GainTrack in less than a minute</p>
                    </div>

                    <form th:action="@{/register}" th:object="${registrationCreate}" method="post" class="d-grid gap-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div>
                            <label for="username" class="form-label fw-semibold">Username</label>
                            <input id="username" th:field="*{username}" type="text" class="form-control form-control-lg" placeholder="your username" required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                        </div>

                        <div>
                            <label for="email" class="form-label fw-semibold">Email</label>
                            <input id="email" th:field="*{email}" type="email" class="form-control form-control-lg" placeholder="you@email.com" required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <div>
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <input id="password" th:field="*{password}" type="password" class="form-control form-control-lg" placeholder="minimum 8 characters" required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>

                        <div>
                            <label for="confirmPassword" class="form-label fw-semibold">Confirm password</label>
                            <input id="confirmPassword" th:field="*{confirmPassword}" type="password" class="form-control form-control-lg" placeholder="repeat your password" required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg login-submit-btn">Create account</button>

                        <p class="text-secondary text-center mb-0">
                            Already have an account?
                            <a th:href="@{/login}" class="text-decoration-none fw-semibold">Log in here</a>.
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
