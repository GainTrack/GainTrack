<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add exercise</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body class="bg-body-tertiary">
<div th:replace="~{fragments/navbar :: appNavbar}"></div>

<div class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
        <div>
            <h1 class="h2 mb-1">Add exercise</h1>
            <p class="text-secondary mb-0">Add a new exercise to the library</p>
        </div>
        <a th:href="@{/exercises}" class="btn btn-outline-secondary">Back to exercises</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form th:action="@{/exercises}" th:object="${exercise}" method="post" class="row g-3">

                <div class="col-12">
                    <label for="name" class="form-label">Name</label>
                    <input id="name"
                           type="text"
                           class="form-control"
                           th:field="*{name}"
                           placeholder="e.g. Bench Press"
                           required>
                <div th:if="${#fields.hasErrors('name')}"
                     th:errors="*{name}"
                     class="text-danger small mt-1"></div>
                </div>

                <div class="col-12">
                    <label for="description" class="form-label">Description</label>
                    <textarea id="description"
                              class="form-control"
                              th:field="*{description}"
                              rows="5"
                              placeholder="Write a short description of the exercise..."></textarea>
                </div>

                <div class="col-12 col-md-6">
                    <label for="type" class="form-label">Type</label>
                    <select id="type" class="form-select" th:field="*{type}" required>
                        <option value="">Select type</option>
                        <option th:each="type : ${exerciseTypes}"
                                th:value="${type}"
                                th:text="${type}">
                        </option>
                    </select>
                    <div th:if="${#fields.hasErrors('type')}"
                         th:errors="*{type}"
                         class="text-danger small mt-1"></div>
                </div>

                <div class="col-12">
                    <label class="form-label d-block">Muscle groups</label>
                    <div class="d-flex flex-wrap gap-3">
                        <div th:each="muscleGroup : ${muscleGroups}" class="form-check">
                            <input class="form-check-input"
                                   type="checkbox"
                                   name="muscleGroupIds"
                                   th:value="${muscleGroup.id}"
                                   th:id="'muscleGroup-' + ${muscleGroup.id}">
                            <label class="form-check-label" th:for="'muscleGroup-' + ${muscleGroup.id}" th:text="${muscleGroup.name}"></label>
                        </div>
                    </div>
                </div>

                <div class="col-12 d-flex flex-wrap gap-2">
                    <button type="submit" class="btn btn-primary">Add exercise</button>
                    <a th:href="@{/exercises}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
