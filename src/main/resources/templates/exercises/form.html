<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add exercise</title>

    <link rel="stylesheet" th:href="@{/css/exercises.css}">
    <link rel="stylesheet" th:href="@{/css/exercise-form.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
</head>
<body>
<div class="page-container">
    <div class="page-header">
        <div>
            <h1>Add exercise</h1>
            <p>Add a new exercise to the library</p>
        </div>
        <a th:href="@{/exercises}" class="secondary-button">Back to exercises</a>
    </div>

    <div class="content-card">
        <form th:action="@{/exercises}" th:object="${exercise}" method="post" class="exercise-form">

            <div class="form-group">
                <label for="name">Name</label>
                <input id="name"
                       type="text"
                       th:field="*{name}"
                       placeholder="e.g. Bench Press"
                       required>
                <div th:if="${#fields.hasErrors('name')}"
                     th:errors="*{name}"
                     class="validation-error"></div>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description"
                          th:field="*{description}"
                          rows="5"
                          placeholder="Write a short description of the exercise..."></textarea>
            </div>

            <div class="form-group">
                <label for="type">Type</label>
                <select id="type" th:field="*{type}" required>
                    <option value="">Select type</option>
                    <option th:each="type : ${exerciseTypes}"
                            th:value="${type}"
                            th:text="${type}">
                    </option>
                </select>
                <div th:if="${#fields.hasErrors('type')}"
                     th:errors="*{type}"
                     class="validation-error"></div>
            </div>

            <div class="form-group">
                <label>Muscle groups</label>
                <div class="checkbox-group">
                    <div th:each="muscleGroup : ${muscleGroups}" class="checkbox-item">
                        <label>
                            <input type="checkbox"
                                   name="muscleGroupIds"
                                   th:value="${muscleGroup.id}">
                            <span th:text="${muscleGroup.name}"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="primary-button">Add exercise</button>
                <a th:href="@{/exercises}" class="secondary-button">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
