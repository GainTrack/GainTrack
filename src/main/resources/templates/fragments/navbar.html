<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<nav class="navbar navbar-expand-lg bg-white app-navbar" th:fragment="appNavbar">
    <div class="container py-2">
        <a class="navbar-brand d-flex align-items-center gap-2 app-brand" th:href="@{/}">
            <img th:src="@{/pics/icon.png}" alt="GainTrack logo" class="app-brand-icon">
            <span>GainTrack</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#appNavbarNav"
                aria-controls="appNavbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="appNavbarNav">
            <ul class="navbar-nav ms-auto gap-lg-2 align-items-lg-center">
                <li class="nav-item">
                    <a class="nav-link app-nav-link"
                       th:classappend="${activePage == 'dashboard' ? ' active' : ''}"
                       th:href="@{/}">
                        Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link app-nav-link"
                       th:classappend="${activePage == 'exercises' ? ' active' : ''}"
                       th:href="@{/exercises}">
                        Exercises
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link app-nav-link"
                       th:classappend="${activePage == 'workouts' ? ' active' : ''}"
                       th:href="@{/workouts}">
                        Workouts
                    </a>
                </li>
                <li class="nav-item" th:if="${isAdmin}">
                    <a class="nav-link app-nav-link"
                       th:classappend="${activePage == 'adminUsers' ? ' active' : ''}"
                       th:href="@{/admin/users}">
                        Admin
                    </a>
                </li>
                <li class="nav-item ms-lg-2">
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
